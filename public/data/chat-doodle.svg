    <circle cx="234" cy="48" r="1.4" fill="#E8C96A" fill-opacity="0.06" stroke="none"/>
    <circle cx="244" cy="46" r="1.4" fill="#E8C96A" fill-opacity="0.06" stroke="none"/>
    <circle cx="240" cy="56" r="1.4" fill="#E8C96A" fill-opacity="0.06" stroke="none"/>
    <circle cx="248" cy="56" r="1.4" fill="#E8C96A" fill-opacity="0.06" stroke="none"/>

