    <circle cx="232" cy="284" r="14"/>
    <circle cx="228" cy="281" r="1.2" fill="#E8C96A" fill-opacity="0.06" stroke="none"/>
    <circle cx="236" cy="281" r="1.2" fill="#E8C96A" fill-opacity="0.06" stroke="none"/>
    <circle cx="232" cy="288" r="1.2" fill="#E8C96A" fill-opacity="0.06" stroke="none"/>

